name: CI Build & Test Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - name: Checkout Code Repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install Runtime Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pytest pytest-cov
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Run Ruff Lint Checks
      run: ruff check src/ tests/ config/

    - name: Run Mypy Type Analysis
      # --ignore-missing-imports to ignore yfinance, telebot, etc. which don't have types
      run: mypy --ignore-missing-imports src/ config/

    - name: Run Pytest Test Suite
      env:
        APP_ENV: testing
        OPENAI_API_KEY: mock_openai_api_key_for_testing
        GEMINI_API_KEY: mock_gemini_api_key_for_testing
        TELEGRAM_BOT_TOKEN: "123456789:mock_telegram_bot_token_for_testing"
      run: |
        pytest tests/ --cov=src --cov-report=xml

    - name: Upload Coverage Reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: coverage.xml
        retention-days: 7
