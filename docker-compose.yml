version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock_advisor_api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    command: uvicorn ai_stock_advisor.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stock_advisor_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    command: streamlit run src/ai_stock_advisor/dashboard/app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - api
